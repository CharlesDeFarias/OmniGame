<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#141428" />
  <!-- Neutral pre-JS fallback (review-queue #8): main.ts sets the real title from the profile. -->
  <title>OmniGame</title>
  <style>
    @font-face {
      font-family: 'Fredoka';
      src: url('fonts/fredoka-latin.woff2') format('woff2');
      font-weight: 300 700;
      font-display: swap;
    }
    html, body { margin: 0; padding: 0; background: #141428; height: 100%; overflow: hidden; }
    #app { width: 100%; height: 100%; }
    * { touch-action: none; user-select: none; -webkit-user-select: none; }
    /* Branded splash (plan 9): visible instantly, removed by main.ts once
       Phaser fires READY. Title ships neutral; main.ts swaps in the profile
       name before the first paint settles (see docs/PUBLIC-BUILD.md). */
    #splash {
      position: absolute; inset: 0; z-index: 10; background: #141428;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 30px; transition: opacity 300ms ease;
    }
    #splash.splash-hide { opacity: 0; pointer-events: none; }
    /* CSS heart: rotated square + two circles, all blush. */
    .splash-heart {
      width: 58px; height: 58px; background: #fd79a8;
      transform: rotate(45deg); position: relative; margin-bottom: 14px;
    }
    .splash-heart::before, .splash-heart::after {
      content: ''; position: absolute; width: 58px; height: 58px;
      border-radius: 50%; background: #fd79a8;
    }
    .splash-heart::before { left: -29px; }
    .splash-heart::after { top: -29px; }
    .splash-title {
      font-family: 'Fredoka', 'Trebuchet MS', sans-serif;
      font-size: 34px; font-weight: 600; color: #fff4e0; letter-spacing: 0.5px;
    }
    .splash-spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(245, 197, 66, 0.25); border-top-color: #f5c542;
      animation: splash-spin 0.9s linear infinite;
    }
    @keyframes splash-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="splash">
    <div class="splash-heart"></div>
    <div class="splash-title">OmniGame</div>
    <div class="splash-spinner"></div>
  </div>
  <script type="module" src="/src/render/main.ts"></script>
</body>
</html>
